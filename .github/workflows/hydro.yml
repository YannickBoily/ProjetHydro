name: Update Hydro Outages
on:
  schedule:
    - cron: '*/15 * * * *'  # toutes les 15 minutes
  workflow_dispatch:        # lancement manuel
jobs:
  update_outages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run script
        run: python gestion.py
      - name: Commit & Push CSV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hydroquebec_history.csv
          git commit -m "Update CSV from GitHub Actions" || echo "No changes"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
